version: '3.8'
services:
  redis:
    image: redis:latest
    ports:
      - '6379:6379'
    networks:
      - my-network
  server:
    build: .
    ports:
      - '3001:3001'
    command: npm start
    depends_on:
      - redis
    networks:
      - my-network
  worker:
    build: .
    command: npm run worker
    depends_on:
      - redis
    networks:
      - my-network

networks:
  my-network:
