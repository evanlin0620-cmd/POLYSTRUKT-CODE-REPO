<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Polystrukt | Thought to Form</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&family=Syne:wght@700;800&family=Unbounded:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #fafafa;
        cursor: none;
      }
      h1, h2, h3, h4, h5, h6 {
        font-family: 'Space Grotesk', sans-serif;
      }
      .font-technical {
        font-family: 'JetBrains Mono', monospace;
      }
      .font-unique {
        font-family: 'Unbounded', sans-serif;
        text-transform: uppercase;
      }
      
      .bevel-light {
        box-shadow: 
          inset 1px 1px 0px rgba(255,255,255,0.8),
          inset -1px -1px 0px rgba(0,0,0,0.05),
          0 4px 6px -1px rgba(0,0,0,0.1);
      }
      
      .bevel-dark {
        box-shadow: 
          inset 1px 1px 0px rgba(255,255,255,0.1),
          inset -1px -1px 0px rgba(0,0,0,0.4),
          0 10px 15px -3px rgba(0,0,0,0.3);
      }

      ::-webkit-scrollbar {
        width: 12px;
        height: 12px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(161, 161, 170, 0.4);
        border-radius: 20px;
        border: 3px solid transparent;
        background-clip: content-box;
        transition: background 0.2s ease;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(139, 92, 246, 0.8);
        background-clip: content-box;
      }
      
      * {
        scrollbar-width: thin;
        scrollbar-color: rgba(161, 161, 170, 0.5) transparent;
      }
    </style>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
