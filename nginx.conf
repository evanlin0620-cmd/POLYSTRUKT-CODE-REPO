worker_processes 1;

events {
  worker_connections 1024;
}

http {
  upstream polystrukt_app {
    server 127.0.0.1:3001;
    server 127.0.0.1:3002;
    # Add more servers as you scale
  }

  server {
    listen 80;
    # This should be the path to your project's build output directory
    root /path/to/your/project/dist;
    index index.html;

    # Serve static assets with long-lived cache headers
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg)$ {
      expires 1y;
      add_header Cache-Control "public";
    }

    # Proxy API requests to the backend
    location /api/ {
      proxy_pass http://polystrukt_app;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # Health check configuration
      health_check;
    }

    # Serve the index.html for all other requests (for SPA routing)
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
